version: '3.8'
 
services:
  db:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin:5.2.0
    platform: linux/arm64/v8
    environment:
      PMA_USER: root
      PMA_PASSWORD: root
    links:
      - db
    ports:
      - 8080:80
volumes:
  mysql:
    external: true
